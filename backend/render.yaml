services:
  - type: web
    name: pfap-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production

      - key: LOG_LEVEL
        value: INFO

      - key: SECRET_KEY
        generateValue: true



















